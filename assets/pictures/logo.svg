<svg xmlns="http://www.w3.org/2000/svg" width="680" height="200" viewBox="0 0 680 200">
  <rect width="100%" height="100%" fill="transparent"/>

  <!-- Helice -->
  <g transform="translate(120,100)">
    <circle r="40" fill="white"/>
    <circle r="10" fill="white"/>

    <!-- pales -->
    <ellipse rx="12" ry="50" fill="red" transform="rotate(45) translate(0,-40)"/>
    <ellipse rx="12" ry="50" fill="blue" transform="rotate(135) translate(0,-40)"/>
    <ellipse rx="12" ry="50" fill="red" transform="rotate(225) translate(0,-40)"/>
    <ellipse rx="12" ry="50" fill="blue" transform="rotate(315) translate(0,-40)"/>
  </g>

  <!-- Texte -->
