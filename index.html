<script>
    const photoUrl = `assets/timeline/`;
    const mapContainer = document.getElementById('map');
    const appMode = {
        NORMAL: 'mode_normal',
        EDIT: 'mode_edit',
        ADD: 'mode_add',
        EDIT_ZONE: 'mode_edit_zone',
         TIMELAPSE: 'mode_timelapse'
    };
    let chosenPhoto = photos[0]; // Initialize chosenPhoto with the first photo in the list
    
    setMode(appMode.NORMAL);
    const map = L.map('map',{maxZoom:22, minZoom:6}).setView([43.45, 5.295], 13);

    const calculatedCenter = getCenterFromBounds(photos[0].coordinates);    
    const photoData = {
        id: 1,
        url: `${photoUrl}img1.jpg`,
        bounds: photos[0].coordinates,// [[43.451245, 5.298199], [43.453836, 5.305227]], // [[southWestLat, southWestLng], [northEastLat, northEastLng]]
        center: calculatedCenter // Le point central pour le marqueur
    };

// 2. Création des éléments (sans les ajouter à la carte de suite)
const marker = L.marker(photoData.center);
let myImage = L.imageOverlay(photoData.url, photoData.bounds);
    console.log("Zoom level: ");

marker.on('click', () => {
    // 1. On ajoute l'image immédiatement (elle est en dessous du marqueur)
    if (!map.hasLayer(myImage)) {
        myImage.addTo(map);
    }

    map.flyTo(photoData.center, 18, {
        duration: 0.5
    });
})

    // 2. Ajouter le fond de carte (OpenStreetMap)
    const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const baseMaps = {
        "OpenStreetMap": osmLayer // L.tileLayer habituel, on peut mettre d'autres
    }
    const overlayMaps = {
        // "Photos" : photoLayerGroup,
        // "Zones dessinés" : zoneLayerGroup,
        "Orthophoto" : myImage
    }

    L.control.layers( baseMaps, overlayMaps, {
        collapsed : true,
        position : 'bottomleft'
    }).addTo(map);
   
    
map.on('zoomend', updateVisibility);

// Exécuter une fois au démarrage
updateVisibility();

</script>
<script src="js/custom.js"></script>
